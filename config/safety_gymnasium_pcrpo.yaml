algorithm:
  class_name: PCRPO
  # shared training parameters
  normalize_advantage_per_mini_batch: false
  value_loss_coef: 1.0
  cost_loss_coef: 1.0
  use_clipped_value_loss: true
  use_clipped_cost_loss: true
  clip_param: 0.2
  entropy_coef: 0.0
  gamma: 0.99
  lam: 0.95
  max_grad_norm: 40.0
  learning_rate: 0.0003
  num_learning_epochs: 10
  num_mini_batches: 4
  schedule: fixed
  desired_kl: null

  # PCRPO / TRPO specific parameters
  kl_threshold: 0.01
  cg_iters: 10
  cg_damping: 0.1
  ls_step: 10
  line_search_fraction: 0.5
  fraction_coef: 0.5
  projection_threshold: null   # defaults to sum(cost_limits); raise it for soft-region variants

  # Disable extra features by default
  rnd_cfg: null
  symmetry_cfg: null

policy:
  class_name: ActorCriticCost
  activation: elu
  actor_hidden_dims: [64, 64]
  critic_hidden_dims: [64, 64]
  cost_critic_hidden_dims: [64, 64]
  init_noise_std: 1.0
  noise_std_type: "scalar"
  num_costs: 1

runner:
  num_steps_per_env: 2048
  max_iterations: 500
  empirical_normalization: false
  save_interval: 100
  experiment_name: safety_gymnasium_pcrpo
  run_name: ""
  logger: wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  load_run: -1
  resume_path: null
  checkpoint: -1

runner_class_name: OnPolicyRunner
seed: 1
