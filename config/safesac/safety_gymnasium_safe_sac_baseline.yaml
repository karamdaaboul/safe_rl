# Safe SAC - Baseline configuration
# Current settings (reference for comparison)

algorithm:
  class_name: SafeSAC
  # -- Discount and target update
  gamma: 0.99
  tau: 0.005

  # -- Learning rates
  actor_lr: 0.0003
  critic_lr: 0.0003
  cost_critic_lr: 0.0003
  alpha_lr: 0.0003

  # -- Entropy regularization
  alpha: 0.2
  auto_entropy_tuning: true
  target_entropy: null

  # -- Training
  batch_size: 256
  num_updates_per_step: 1
  max_grad_norm: 1.0

  # -- PID Lagrangian (current baseline)
  lagrangian_pid: [0.05, 0.01, 0.05]  # [Kp, Ki, Kd]
  lambda_init: [0.001]
  lambda_max: 25.0
  pid_delta_p_ema_alpha: 0.90
  pid_delta_d_ema_alpha: 0.95
  pid_d_delay: 10
  sum_norm: true
  diff_norm: false
  cost_limits: [25.0]

policy:
  class_name: SafeSACActorCritic
  activation: relu
  actor_hidden_dims: [256, 256]
  critic_hidden_dims: [256, 256]
  log_std_min: -20
  log_std_max: 2
  num_costs: 1

runner:
  num_steps_per_env: 1
  max_iterations: 1500000
  max_size: 1000000
  start_random_steps: 5000
  update_after: 5000
  update_every: 1
  save_interval: 10000
  empirical_normalization: false
  experiment_name: safety_gymnasium_safe_sac_baseline
  run_name: ""
  logger: wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  wandb_dir: ./wandb_logs
  log_interval: 1000
  load_run: -1
  resume_path: null
  checkpoint: -1

runner_class_name: OffPolicyRunner
seed: 1
