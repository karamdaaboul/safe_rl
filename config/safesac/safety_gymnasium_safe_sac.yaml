# Safe SAC with PID Lagrangian constraint handling
# Combines SAC with constrained RL using PID-based Lagrangian multiplier updates

algorithm:
  class_name: SafeSAC
  # -- Discount and target update
  gamma: 0.99
  tau: 0.005  # soft target update coefficient

  # -- Learning rates
  actor_lr: 0.0003
  critic_lr: 0.0003
  cost_critic_lr: 0.0003
  alpha_lr: 0.0003  # entropy coefficient learning rate

  # -- Entropy regularization
  alpha: 0.2  # initial entropy coefficient
  auto_entropy_tuning: true  # automatically tune entropy coefficient
  target_entropy: null  # if null, set to -dim(action_space)

  # -- Training
  batch_size: 256
  num_updates_per_step: 1  # gradient steps per environment step
  max_grad_norm: 1.0

  # -- PID Lagrangian parameters (IMPROVED - fixes integral windup)
  lagrangian_pid: [0.05, 0.01, 0.05]  # [Kp, Ki, Kd] - doubled Ki for faster response
  lambda_init: [0.001]
  lambda_max: 25.0  # Reduced from 100.0 to prevent excessive penalties
  # "smoothing factor" for the error. Lower values = faster response.
  pid_delta_p_ema_alpha: 0.90  # Reduced from 0.99 for faster decay
  pid_d_delay: 10
  sum_norm: true
  diff_norm: false

  # cost_limits will be set via command line or env wrapper

policy:
  class_name: SafeSACActorCritic
  # Network architecture
  activation: relu
  actor_hidden_dims: [256, 256]
  critic_hidden_dims: [256, 256]
  # SAC specific
  log_std_min: -20
  log_std_max: 2
  # Safe RL
  num_costs: 1  # number of cost constraints (will be updated by env)

runner:
  # -- Collection
  num_steps_per_env: 1  # steps per environment per iteration

  # -- Training duration
  max_iterations: 1000000

  # -- Replay buffer
  max_size: 1000000  # replay buffer size

  # -- Exploration
  start_random_steps: 5000  # random actions before training starts

  # -- Update schedule
  update_after: 5000  # start training after this many steps
  update_every: 1  # update policy every N iterations

  # -- Checkpointing
  save_interval: 10000
  empirical_normalization: false

  # -- Logging
  experiment_name: safety_gymnasium_safe_sac
  run_name: ""
  logger: wandb  # tensorboard, neptune, wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  wandb_dir: ./wandb_logs  # custom wandb directory

  # -- Load and resume
  load_run: -1
  resume_path: null
  checkpoint: -1

  # Logging frequency
  log_interval: 1000

runner_class_name: OffPolicyRunner
seed: 1

