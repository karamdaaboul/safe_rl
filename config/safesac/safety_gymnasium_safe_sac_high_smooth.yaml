# Safe SAC - High Smoothing
# Increase EMA smoothing factor for slower, more stable lambda updates

algorithm:
  class_name: SafeSAC
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  cost_critic_lr: 0.0003
  alpha_lr: 0.0003
  alpha: 0.2
  auto_entropy_tuning: true
  target_entropy: null
  batch_size: 256
  num_updates_per_step: 1
  max_grad_norm: 1.0

  # -- PID Lagrangian: Higher smoothing for stability
  lagrangian_pid: [0.05, 0.01, 0.01]  # Moderate Kd
  lambda_init: [0.001]
  lambda_max: 25.0
  pid_delta_p_ema_alpha: 0.99  # Very high smoothing
  pid_delta_d_ema_alpha: 0.99  # Very high smoothing
  pid_d_delay: 20  # Longer delay
  sum_norm: true
  diff_norm: false
  cost_limits: [50.0]

policy:
  class_name: SafeSACActorCritic
  activation: relu
  actor_hidden_dims: [256, 256]
  critic_hidden_dims: [256, 256]
  log_std_min: -20
  log_std_max: 2
  num_costs: 1

runner:
  num_steps_per_env: 1
  max_iterations: 1000000
  max_size: 1000000
  start_random_steps: 5000
  update_after: 5000
  update_every: 1
  save_interval: 10000
  empirical_normalization: false
  experiment_name: safety_gymnasium_safe_sac_high_smooth
  run_name: ""
  logger: wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  wandb_dir: ./wandb_logs
  log_interval: 1000
  load_run: -1
  resume_path: null
  checkpoint: -1

runner_class_name: OffPolicyRunner
seed: 1
