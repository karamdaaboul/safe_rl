algorithm:
  class_name: CPO
  # shared PPO-family parameters
  normalize_advantage_per_mini_batch: false
  value_loss_coef: 1.0
  cost_value_loss_coef: 1.0
  clip_param: 0.2
  use_clipped_value_loss: true
  entropy_coef: 0.0
  gamma: 0.99
  gamma_cost: 0.95       # Shorter cost horizon (~20 steps) — sharper targets for the cost critic
  lam: 0.95
  max_grad_norm: 40.0
  learning_rate: 0.0003
  num_learning_epochs: 10
  num_mini_batches: 4
  schedule: fixed

  # CPO trust-region parameters
  target_kl: 0.01
  cg_iters: 10
  cg_damping: 0.1
  backtrack_coeff: 0.8
  max_backtracks: 15
  fvp_sample_freq: 1

  # Disable extra features by default
  rnd_cfg: null
  symmetry_cfg: null

policy:
  class_name: ActorCritic
  actor_type: gaussian
  critic_type: standard
  actor_kwargs:
    hidden_dims: [128, 128, 128]
    activation: elu
    init_noise_std: 1.0
    noise_std_type: scalar
  critic_kwargs:
    hidden_dims: [128, 128, 128]
    activation: elu
  cost_critic_kwargs:
    hidden_dims: [256, 256, 256]  # preserved from legacy default (cost_critic_hidden_dims was unset)
    activation: elu

runner:
  num_steps_per_env: 2048
  max_iterations: 600
  empirical_normalization: false
  save_interval: 100
  experiment_name: safety_gymnasium_cpo
  run_name: ""
  logger: wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  load_run: -1
  resume_path: null
  checkpoint: -1

runner_class_name: OnPolicyRunner
seed: 1
