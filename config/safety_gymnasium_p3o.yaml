algorithm:
  class_name: P3O
  # training parameters copied from PPO for closer comparison
  normalize_advantage_per_mini_batch: false
  value_loss_coef: 1.0
  clip_param: 0.2
  use_clipped_value_loss: true
  desired_kl: 0.01
  entropy_coef: 0.01
  gamma: 0.99
  lam: 0.95
  max_grad_norm: 1.0
  learning_rate: 0.001
  num_learning_epochs: 10
  num_mini_batches: 32
  schedule: adaptive

  # P3O-specific parameters
  cost_loss_coef: 1.0
  use_clipped_cost_loss: false
  rho: 1.1
  kappa_max: 1000.0
  adaptive_penalty: true
  constraint_margin: 0.85
  kappa: [1.0]

  # Keep PPO auxiliary settings so shared training setup stays aligned
 rnd_cfg:
      weight: 0.0
      weight_schedule: null
      reward_normalization: false
      state_normalization: true
      learning_rate: 0.001
      num_outputs: 1
      predictor_hidden_dims: [-1]
      target_hidden_dims: [-1]

  symmetry_cfg:
    use_data_augmentation: true
    use_mirror_loss: false
    data_augmentation_func: null
    mirror_loss_coeff: 0.0

policy:
  class_name: ActorCritic
  actor_type: gaussian
  critic_type: standard
  actor_kwargs:
    hidden_dims: [128, 128, 128]
    activation: elu
    init_noise_std: 1.0
    noise_std_type: scalar
  critic_kwargs:
    hidden_dims: [128, 128, 128]
    activation: elu
  cost_critic_kwargs:
    hidden_dims: [256, 256, 256]  # preserved from legacy default (cost_critic_hidden_dims was unset)
    activation: elu

runner:
    num_steps_per_env: 2048
    max_iterations: 600
    empirical_normalization: false
    save_interval: 100
    experiment_name: safety_gymnasium_p3o
    run_name: ""
    logger: wandb
    wandb_project: SafeRL
    wandb_entity: uqerh-kit
    load_run: -1
    resume_path: null
    checkpoint: -1

runner_class_name: OnPolicyRunner
seed: 1
