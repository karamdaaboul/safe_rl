algorithm:
  class_name: PPOL_PID
  # training parameters
  normalize_advantage_per_mini_batch: false
  value_loss_coef: 1.0
  clip_param: 0.2
  use_clipped_value_loss: true
  desired_kl: 0.02
  entropy_coef: 0.0
  gamma: 0.99
  lam: 0.95
  max_grad_norm: 40.0
  learning_rate: 0.0003
  num_learning_epochs: 40
  num_mini_batches: 4
  schedule: adaptive

  # PPOL-PID specific parameters (aligned with OmniSafe CPPOPID)
  lagrangian_pid: [0.1, 0.01, 0.01]  # [Kp, Ki, Kd]
  lambda_init: [0.001]
  lambda_max: 100.0
  pid_delta_p_ema_alpha: 0.95
  pid_delta_d_ema_alpha: 0.95
  pid_d_delay: 10
  sum_norm: true
  diff_norm: false

  # Cost critic loss
  cost_loss_coef: 1.0
  use_clipped_cost_loss: true

  # Disable extra features by default
  rnd_cfg: null
  symmetry_cfg: null

policy:
  class_name: ActorCritic
  activation: elu
  actor_hidden_dims: [128, 128, 128]
  critic_hidden_dims: [128, 128, 128]
  init_noise_std: 1.0
  noise_std_type: "scalar"

runner:
  num_steps_per_env: 2048
  max_iterations: 500
  empirical_normalization: false
  save_interval: 100
  experiment_name: safety_gymnasium_ppol_pid
  run_name: ""
  logger: wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  load_run: -1
  resume_path: null
  checkpoint: -1

runner_class_name: OnPolicyRunner
seed: 1

