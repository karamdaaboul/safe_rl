# PPOL_PID - Low Derivative Gain (Kd)
# Reduce derivative term to minimize oscillations

algorithm:
  class_name: PPOL_PID
  # training parameters
  # -- advantage normalization
  normalize_advantage_per_mini_batch: false
  # -- value function
  value_loss_coef: 1.0
  clip_param: 0.2
  use_clipped_value_loss: true
  # -- surrogate loss
  desired_kl: 0.01
  entropy_coef: 0.01
  gamma: 0.99
  lam: 0.95
  max_grad_norm: 1.0
  # -- training
  learning_rate: 0.001
  num_learning_epochs: 10
  num_mini_batches: 32  # mini batch size = num_envs * num_steps / num_mini_batches
  schedule: adaptive  # adaptive, fixed

  # PPOL-PID specific parameters: Reduced Kd to minimize oscillations
  lagrangian_pid: [0.05, 0.01, 0.001]  # Kd: 0.05 -> 0.001
  lambda_init: [0.001]
  lambda_max: 100.0
  pid_delta_p_ema_alpha: 0.95  # Increased smoothing
  pid_delta_d_ema_alpha: 0.95
  pid_d_delay: 10
  sum_norm: true
  diff_norm: false
  cost_limits: [25.0]

  # Cost critic loss
  cost_loss_coef: 1.0
  use_clipped_cost_loss: true

  # Disable extra features by default
  rnd_cfg: null
  symmetry_cfg: null

policy:
  class_name: ActorCritic
  activation: elu
  actor_hidden_dims: [128, 128, 128]
  critic_hidden_dims: [128, 128, 128]
  init_noise_std: 1.0
  noise_std_type: "scalar"

runner:
  num_steps_per_env: 2048  # number of steps per environment per iteration
  max_iterations: 100000  # number of policy updates
  empirical_normalization: false
  # -- logging parameters
  save_interval: 10000  # check for potential saves every `save_interval` iterations
  experiment_name: safety_gymnasium_ppol_pid_low_kd
  run_name: ""
  # -- logging writer
  logger: wandb  # tensorboard, neptune, wandb
  wandb_project: SafeRL
  wandb_entity: uqerh-kit
  # -- load and resuming
  load_run: -1  # -1 means load latest run
  resume_path: null  # updated from load_run and checkpoint
  checkpoint: -1  # -1 means load latest checkpoint

runner_class_name: OnPolicyRunner
seed: 1
