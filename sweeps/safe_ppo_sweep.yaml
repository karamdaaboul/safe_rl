# Safe PPO sweep for comprehensive hyperparameter exploration
# Focuses on safety-critical parameters and performance optimization
program: scripts/train/isaac.py
method: grid
metric:
  goal: maximize
  name: "Train/mean_reward"
parameters:
  # Fixed parameters - Environment and basic settings
  task:
    value: "Unitree-Go2-Velocity"  # Change this to your desired task
  seed:
    value: 1
  max_iterations:
    value: 3000
  logger:
    value: "wandb"
    
  # Core PPO parameters - most impactful
  num_learning_epochs:
    values: [3, 5, 8]
  num_mini_batches:
    values: [4, 8, 16]
  
  # Discount and advantage
  gamma:
    values: [0.99, 0.998]
  lam:
    values: [0.95, 0.98]
  
  # Loss coefficients
  entropy_coef:
    values: [0.0, 0.01, 0.05]
  value_loss_coef:
    values: [0.5, 1.0]
  
  # Runner parameters
  num_steps_per_env:
    values: [16, 24, 32]
 
  num_envs:
    values: [1024, 2048, 4096, 8192]
    
  # Environment reward parameters 
  track_lin_vel_xy_weight:
    values: [1.0, 1.5, 2.0]
  track_ang_vel_z_weight:
    values: [0.5, 0.75, 1.0]
        
command:
  - ${env}
  - python
  - ${program}
  - --headless
  - ${args} 